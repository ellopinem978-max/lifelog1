<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LifeLog - Daily Activity Timeline</title>
    
    <!-- Menggunakan Tailwind CSS via CDN untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Konfigurasi Tailwind Kustom -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb', // blue-600
                        primaryHover: '#1d4ed8', // blue-700
                        darkBg: '#0f172a', // slate-900
                        darkCard: '#1e293b', // slate-800
                        darkBorder: '#334155', // slate-700
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out forwards',
                        'slide-up': 'slideUp 0.4s ease-out forwards',
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0', transform: 'translateY(10px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        slideUp: {
                            '0%': { opacity: '0', transform: 'translateY(100%)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Kumpulan CSS Tambahan -->
    <style>
        /* Gaya Scrollbar Kustom */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }
        .dark ::-webkit-scrollbar-thumb {
            background: #475569;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }

        /* Utilitas Tambahan */
        .pb-safe { padding-bottom: calc(env(safe-area-inset-bottom) + 80px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Transisi Global untuk Dark Mode */
        body {
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .card-transition {
            transition: all 0.2s ease;
        }

        /* Grid Kalender */
        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 4px;
        }
        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 4px;
            border-radius: 0.5rem;
            font-size: 0.875rem;
        }
        
        /* Bar Distribusi Waktu */
        .timeline-bar-segment:hover .tooltip {
            opacity: 1;
            visibility: visible;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 dark:bg-darkBg dark:text-gray-100 antialiased selection:bg-primary selection:text-white font-sans min-h-screen">

    <!-- HEADER APLIKASI -->
    <header class="bg-white dark:bg-darkCard border-b border-gray-200 dark:border-darkBorder sticky top-0 z-40 shadow-sm transition-colors duration-300">
        <div class="max-w-3xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-2">
                <div class="bg-primary text-white p-1.5 rounded-lg shadow-sm" id="logo-icon-container">
                    <!-- Icon SVG disuntikkan oleh JS -->
                </div>
                <h1 class="text-xl font-black tracking-tight text-gray-800 dark:text-white">
                    Life<span class="text-primary">Log</span>
                </h1>
            </div>
            <div class="flex items-center space-x-3">
                <div class="text-[10px] sm:text-xs font-semibold text-gray-500 dark:text-gray-400 bg-gray-100 dark:bg-slate-700 px-3 py-1.5 rounded-full border border-gray-200 dark:border-slate-600">
                    Alat Refleksi
                </div>
                <button id="theme-toggle-btn" class="p-2 text-gray-500 hover:text-gray-800 dark:text-gray-400 dark:hover:text-white hover:bg-gray-100 dark:hover:bg-slate-700 rounded-full transition" aria-label="Toggle Dark Mode">
                    <!-- Icon Tema disuntikkan oleh JS -->
                </button>
            </div>
        </div>
    </header>

    <!-- AREA KONTEN UTAMA -->
    <main id="app-content" class="max-w-3xl mx-auto px-4 py-6 pb-safe relative">
        <!-- Konten dinamis akan dimuat di sini oleh JavaScript -->
    </main>

    <!-- NAVIGASI BAWAH (BOTTOM TABS) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white dark:bg-darkCard border-t border-gray-200 dark:border-darkBorder pb-[env(safe-area-inset-bottom)] z-40 shadow-[0_-4px_20px_rgba(0,0,0,0.05)] dark:shadow-[0_-4px_20px_rgba(0,0,0,0.2)] transition-colors duration-300">
        <div class="max-w-3xl mx-auto flex justify-around px-2">
            <button class="nav-btn flex-1 py-3 my-1 flex flex-col items-center justify-center space-y-1 transition rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700" data-tab="timeline">
                <span class="icon-container" id="nav-icon-timeline"></span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Timeline</span>
            </button>
            <button class="nav-btn flex-1 py-3 my-1 flex flex-col items-center justify-center space-y-1 transition rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700" data-tab="analytics">
                <span class="icon-container" id="nav-icon-analytics"></span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Analitik</span>
            </button>
            <button class="nav-btn flex-1 py-3 my-1 flex flex-col items-center justify-center space-y-1 transition rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700" data-tab="calendar">
                <span class="icon-container" id="nav-icon-calendar"></span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Kalender</span>
            </button>
            <button class="nav-btn flex-1 py-3 my-1 flex flex-col items-center justify-center space-y-1 transition rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700" data-tab="manage">
                <span class="icon-container" id="nav-icon-manage"></span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Kategori</span>
            </button>
            <button class="nav-btn flex-1 py-3 my-1 flex flex-col items-center justify-center space-y-1 transition rounded-xl hover:bg-gray-50 dark:hover:bg-slate-700" data-tab="settings">
                <span class="icon-container" id="nav-icon-settings"></span>
                <span class="text-[10px] font-bold uppercase tracking-wider">Pengaturan</span>
            </button>
        </div>
    </nav>

    <!-- CONTAINER MODAL -->
    <div id="modal-container" class="fixed inset-0 z-50 hidden flex items-center justify-center p-4">
        <div id="modal-overlay" class="absolute inset-0 bg-black/60 dark:bg-black/80 backdrop-blur-sm transition-opacity"></div>
        <div id="modal-content-wrapper" class="relative bg-white dark:bg-darkCard rounded-2xl w-full max-w-md shadow-2xl overflow-hidden animate-slide-up">
            <!-- Isi modal dinamis -->
        </div>
    </div>

    <!-- NOTIFIKASI TOAST -->
    <div id="toast-container" class="fixed top-20 left-1/2 transform -translate-x-1/2 z-50 flex flex-col gap-2 pointer-events-none">
        <!-- Toast akan muncul di sini -->
    </div>

    <!-- ========================================== -->
    <!-- LOGIKA APLIKASI (JAVASCRIPT MURNI)         -->
    <!-- ========================================== -->
    <script>
        /**
         * LIFE LOG - DAILY ACTIVITY TIMELINE
         * Aplikasi pencatatan aktivitas berbasis waktu.
         * Ditulis dengan Vanilla JavaScript untuk performa maksimal dan portabilitas.
         */

        // ----------------------------------------------------------------------
        // 1. PUSTAKA IKON SVG (Menggantikan dependensi eksternal seperti Lucide)
        // ----------------------------------------------------------------------
        const ICONS = {
            activity: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>`,
            clock: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>`,
            barChart: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="20" x2="12" y2="10"></line><line x1="18" y1="20" x2="18" y2="4"></line><line x1="6" y1="20" x2="6" y2="16"></line></svg>`,
            calendar: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>`,
            settings: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"></path><circle cx="12" cy="12" r="3"></circle></svg>`,
            plus: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>`,
            trash: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>`,
            x: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`,
            trendingUp: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></svg>`,
            alert: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>`,
            chevronLeft: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"></polyline></svg>`,
            chevronRight: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"></polyline></svg>`,
            sun: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>`,
            moon: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>`,
            download: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>`,
            upload: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>`,
            flame: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"></path></svg>`,
            award: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>`,
            edit: `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>`,
        };

        // ----------------------------------------------------------------------
        // 2. KONFIGURASI DAN DATA MASTER
        // ----------------------------------------------------------------------
        const AVAILABLE_COLORS = [
            { id: 'blue', class: 'bg-blue-500', text: 'text-blue-500', light: 'bg-blue-100', darkText: 'dark:text-blue-400', darkBg: 'dark:bg-blue-900/40' },
            { id: 'red', class: 'bg-red-500', text: 'text-red-500', light: 'bg-red-100', darkText: 'dark:text-red-400', darkBg: 'dark:bg-red-900/40' },
            { id: 'green', class: 'bg-green-500', text: 'text-green-500', light: 'bg-green-100', darkText: 'dark:text-green-400', darkBg: 'dark:bg-green-900/40' },
            { id: 'yellow', class: 'bg-yellow-500', text: 'text-yellow-500', light: 'bg-yellow-100', darkText: 'dark:text-yellow-400', darkBg: 'dark:bg-yellow-900/40' },
            { id: 'purple', class: 'bg-purple-500', text: 'text-purple-500', light: 'bg-purple-100', darkText: 'dark:text-purple-400', darkBg: 'dark:bg-purple-900/40' },
            { id: 'indigo', class: 'bg-indigo-500', text: 'text-indigo-500', light: 'bg-indigo-100', darkText: 'dark:text-indigo-400', darkBg: 'dark:bg-indigo-900/40' },
            { id: 'pink', class: 'bg-pink-500', text: 'text-pink-500', light: 'bg-pink-100', darkText: 'dark:text-pink-400', darkBg: 'dark:bg-pink-900/40' },
            { id: 'teal', class: 'bg-teal-500', text: 'text-teal-500', light: 'bg-teal-100', darkText: 'dark:text-teal-400', darkBg: 'dark:bg-teal-900/40' },
            { id: 'orange', class: 'bg-orange-500', text: 'text-orange-500', light: 'bg-orange-100', darkText: 'dark:text-orange-400', darkBg: 'dark:bg-orange-900/40' },
            { id: 'gray', class: 'bg-gray-500', text: 'text-gray-500', light: 'bg-gray-100', darkText: 'dark:text-gray-400', darkBg: 'dark:bg-gray-800' }
        ];

        const AVAILABLE_EMOJIS = [
            '📚', '💻', '💼', '🎓', '🎮', '🎬', '🎵', '📱', 
            '🍔', '☕', '🛒', '🚗', '🏃', '🏋️', '🧘', '😴', 
            '🚿', '🧹', '🎨', '⛪', '🗣️', '❤️', '✍️', '🛠️',
            '✈️', '🏕️', '💡', '💰', '📉', '📈', '🩺', '💊'
        ];

        // ----------------------------------------------------------------------
        // 3. STATE MANAGEMENT & LOCAL STORAGE
        // ----------------------------------------------------------------------
        
        // Membaca status tema
        let isDarkMode = localStorage.getItem('lifelog_theme') === 'dark';
        if (isDarkMode || (!localStorage.getItem('lifelog_theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            isDarkMode = true;
        }

        // State Global Aplikasi
        const STATE = {
            activeTab: 'timeline',
            analyticsPeriod: 'daily', // TAMBAHAN: Filter analitik default
            currentDate: new Date().toISOString().split('T')[0], // YYYY-MM-DD
            calendarMonth: new Date().getMonth(), // 0-11
            calendarYear: new Date().getFullYear(),
            activityTypes: [],
            logs: [],
            
            // Inisialisasi dari LocalStorage
            loadData: function() {
                const storedTypes = localStorage.getItem('lifelog_types');
                const storedLogs = localStorage.getItem('lifelog_logs');
                if (storedTypes) this.activityTypes = JSON.parse(storedTypes);
                if (storedLogs) this.logs = JSON.parse(storedLogs);
            },
            
            // Simpan ke LocalStorage
            saveData: function() {
                localStorage.setItem('lifelog_types', JSON.stringify(this.activityTypes));
                localStorage.setItem('lifelog_logs', JSON.stringify(this.logs));
            },

            // Operasi Kategori
            addType: function(typeObj) {
                this.activityTypes.push({ ...typeObj, id: `t_${Date.now()}` });
                this.saveData();
                renderUI();
                showToast('Kategori berhasil ditambahkan', 'success');
            },
            deleteType: function(id) {
                // Konfirmasi apakah ada log yang menggunakan tipe ini
                const isUsed = this.logs.some(l => l.typeId === id);
                if (isUsed) {
                    if(!confirm('Ada aktivitas tercatat menggunakan kategori ini. Menghapusnya juga akan menghapus riwayat aktivitas tersebut. Lanjutkan?')) return;
                    this.logs = this.logs.filter(l => l.typeId !== id);
                }
                this.activityTypes = this.activityTypes.filter(t => t.id !== id);
                this.saveData();
                renderUI();
                showToast('Kategori dihapus', 'success');
            },

            // Operasi Log (Aktivitas Harian)
            addLog: function(logObj) {
                // Validasi tumpang tindih waktu
                const dateLogs = this.logs.filter(l => l.date === logObj.date);
                const newStartMins = timeToMinutes(logObj.startTime);
                const newEndMins = timeToMinutes(logObj.endTime);
                
                if (newStartMins >= newEndMins) {
                    showToast('Waktu selesai harus lebih besar dari waktu mulai', 'error');
                    return false;
                }

                const hasOverlap = dateLogs.some(l => {
                    const existingStart = timeToMinutes(l.startTime);
                    const existingEnd = timeToMinutes(l.endTime);
                    return (newStartMins < existingEnd && newEndMins > existingStart);
                });

                if (hasOverlap) {
                    showToast('Waktu bertabrakan dengan aktivitas lain!', 'error');
                    return false;
                }

                this.logs.push({ ...logObj, id: `l_${Date.now()}` });
                this.saveData();
                renderUI();
                showToast('Aktivitas berhasil dicatat', 'success');
                return true;
            },
            deleteLog: function(id) {
                this.logs = this.logs.filter(l => l.id !== id);
                this.saveData();
                renderUI();
                showToast('Aktivitas dihapus', 'success');
            },
            
            // Helper Getter
            getDailyLogs: function(dateStr) {
                return this.logs
                    .filter(l => l.date === dateStr)
                    .sort((a, b) => timeToMinutes(a.startTime) - timeToMinutes(b.startTime));
            },
            getTypeById: function(id) {
                return this.activityTypes.find(t => t.id === id);
            }
        };

        // Muat data saat pertama kali dijalankan
        STATE.loadData();

        // ----------------------------------------------------------------------
        // 4. FUNGSI UTILITAS WAKTU DAN DURASI
        // ----------------------------------------------------------------------
        
        /** Mengubah string "HH:MM" menjadi total menit (integer) */
        function timeToMinutes(timeStr) {
            if (!timeStr) return 0;
            const parts = timeStr.split(':');
            return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }

        /** Mengubah menit (integer) menjadi string "HH:MM" */
        function minutesToTime(mins) {
            const h = Math.floor(mins / 60).toString().padStart(2, '0');
            const m = (mins % 60).toString().padStart(2, '0');
            return `${h}:${m}`;
        }

        /** Menghitung durasi antara dua jam */
        function calculateDuration(start, end) {
            let diff = timeToMinutes(end) - timeToMinutes(start);
            if (diff < 0) diff += 24 * 60; // Jika melewati tengah malam
            return diff;
        }

        /** Memformat menit menjadi teks yang mudah dibaca ("2 jam 30 menit") */
        function formatDurationText(mins) {
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            if (h > 0 && m > 0) return `${h}j ${m}m`;
            if (h > 0) return `${h} jam`;
            return `${m} menit`;
        }

        /** Mendapatkan nama hari dalam bahasa Indonesia */
        function getDayName(dateStr) {
            const date = new Date(dateStr);
            const days = ['Minggu', 'Senin', 'Selasa', 'Rabu', 'Kamis', 'Jumat', 'Sabtu'];
            return days[date.getDay()];
        }

        /** Memformat tanggal YYYY-MM-DD ke teks (e.g. "12 Agustus 2023") */
        function formatDateIndo(dateStr) {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            return new Date(dateStr).toLocaleDateString('id-ID', options);
        }

        // ----------------------------------------------------------------------
        // 5. ENGINE ANALITIK LANJUTAN (Advanced Analytics Engine)
        // ----------------------------------------------------------------------

        /** Mendapatkan log berdasarkan periode (daily, weekly, monthly) */
        function getLogsByPeriod(period, dateStr) {
            if (period === 'daily') return STATE.getDailyLogs(dateStr);
            
            const targetDate = new Date(dateStr);
            let startDate = new Date(targetDate);
            let endDate = new Date(targetDate);

            if (period === 'weekly') {
                const day = targetDate.getDay(); // 0 (Minggu) - 6 (Sabtu)
                const diffToMonday = targetDate.getDate() - day + (day === 0 ? -6 : 1);
                startDate = new Date(targetDate.setDate(diffToMonday));
                endDate = new Date(startDate);
                endDate.setDate(startDate.getDate() + 6);
            } else if (period === 'monthly') {
                startDate = new Date(targetDate.getFullYear(), targetDate.getMonth(), 1);
                endDate = new Date(targetDate.getFullYear(), targetDate.getMonth() + 1, 0);
            }

            const startStr = startDate.toISOString().split('T')[0];
            const endStr = endDate.toISOString().split('T')[0];

            return STATE.logs.filter(l => l.date >= startStr && l.date <= endStr);
        }

        /** Menghitung Timeline dengan mendeteksi Celah Waktu (Gaps) */
        function generateTimelineWithGaps(dateStr) {
            const dailyLogs = STATE.getDailyLogs(dateStr);
            const result = [];
            let previousEndTime = '00:00';

            dailyLogs.forEach(log => {
                const startMins = timeToMinutes(log.startTime);
                const prevEndMins = timeToMinutes(previousEndTime);

                // Deteksi Gap (Waktu kosong di antara aktivitas)
                if (startMins > prevEndMins) {
                    result.push({
                        isGap: true,
                        startTime: previousEndTime,
                        endTime: log.startTime,
                        duration: startMins - prevEndMins
                    });
                }

                const type = STATE.getTypeById(log.typeId);
                result.push({
                    ...log,
                    isGap: false,
                    type: type,
                    duration: calculateDuration(log.startTime, log.endTime)
                });

                previousEndTime = log.endTime;
            });

            // Gap akhir hingga akhir hari (24:00) jika masih ada sisa waktu
            // Hanya tampilkan jika hari itu adalah masa lalu, bukan hari ini yang belum selesai.
            if (dailyLogs.length > 0) {
                const lastEnd = dailyLogs[dailyLogs.length - 1].endTime;
                const lastEndMins = timeToMinutes(lastEnd);
                const endOfDayMins = 24 * 60;
                
                const todayStr = new Date().toISOString().split('T')[0];
                const isPastDate = dateStr < todayStr;
                
                if (lastEndMins < endOfDayMins && isPastDate) {
                    result.push({
                        isGap: true,
                        startTime: lastEnd,
                        endTime: '24:00',
                        duration: endOfDayMins - lastEndMins,
                        isFinal: true
                    });
                }
            }

            return result;
        }

        /** Menganalisis statistik (Total waktu, Peringkat aktivitas) berdasarkan periode */
        function getAnalyticsData(period, dateStr) {
            const periodLogs = getLogsByPeriod(period, dateStr);
            const typeDurations = {};
            let totalLoggedMins = 0;

            periodLogs.forEach(log => {
                const duration = calculateDuration(log.startTime, log.endTime);
                totalLoggedMins += duration;
                if (!typeDurations[log.typeId]) typeDurations[log.typeId] = 0;
                typeDurations[log.typeId] += duration;
            });

            const ranked = Object.keys(typeDurations).map(typeId => {
                const type = STATE.getTypeById(typeId);
                return {
                    type: type,
                    duration: typeDurations[typeId],
                    percentage: totalLoggedMins > 0 ? ((typeDurations[typeId] / totalLoggedMins) * 100).toFixed(1) : 0
                };
            }).sort((a, b) => b.duration - a.duration);

            return { totalLoggedMins, ranked };
        }

        /** Mencari hari paling produktif dalam 7 hari terakhir */
        function getPeakProductivityInsight() {
            if (STATE.logs.length === 0) return null;
            
            // Mengambil data 7 hari terakhir
            const today = new Date();
            const last7Days = [];
            for(let i=0; i<7; i++) {
                const d = new Date(today);
                d.setDate(d.getDate() - i);
                last7Days.push(d.toISOString().split('T')[0]);
            }

            let bestDay = '';
            let maxMins = 0;

            last7Days.forEach(date => {
                const stats = getAnalyticsData('daily', date);
                if (stats.totalLoggedMins > maxMins) {
                    maxMins = stats.totalLoggedMins;
                    bestDay = date;
                }
            });

            if (maxMins === 0) return null;

            return {
                dayName: getDayName(bestDay),
                durationText: formatDurationText(maxMins)
            };
        }

        /** Menghitung Streak (hari berturut-turut mencatat aktivitas) */
        function calculateStreak() {
            if (STATE.logs.length === 0) return 0;

            // Kumpulkan tanggal unik yang memiliki minimal 1 log
            const uniqueDates = [...new Set(STATE.logs.map(l => l.date))].sort((a, b) => a.localeCompare(b)).reverse(); // Descending
            
            let currentStreak = 0;
            const todayStr = new Date().toISOString().split('T')[0];
            
            // Buat pengecekan mundur dari hari ini atau kemarin
            let checkDate = new Date(todayStr);
            
            // Cek apakah hari ini ada log. Jika tidak, coba mulai hitung dari kemarin.
            let hasLogToday = uniqueDates.includes(todayStr);
            
            if (!hasLogToday) {
                checkDate.setDate(checkDate.getDate() - 1);
            }

            while(true) {
                const checkStr = checkDate.toISOString().split('T')[0];
                if (uniqueDates.includes(checkStr)) {
                    currentStreak++;
                    checkDate.setDate(checkDate.getDate() - 1); // Mundur 1 hari
                } else {
                    break; // Streak putus
                }
            }

            return currentStreak;
        }

        /** Membangun Tab Kalender (Bulan penuh) */
        function buildCalendarView() {
            const container = document.createElement('div');
            container.className = 'space-y-6 animate-fade-in pb-20';

            const monthNames = ['Januari', 'Februari', 'Maret', 'April', 'Mei', 'Juni', 'Juli', 'Agustus', 'September', 'Oktober', 'November', 'Desember'];
            
            // Header Navigasi Kalender
            const headerHtml = `
                <div class="flex justify-between items-center bg-white dark:bg-darkCard p-4 rounded-2xl shadow-sm border border-gray-100 dark:border-darkBorder">
                    <button onclick="changeMonth(-1)" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg transition">${ICONS.chevronLeft}</button>
                    <div class="font-bold text-lg text-gray-800 dark:text-white">
                        ${monthNames[STATE.calendarMonth]} ${STATE.calendarYear}
                    </div>
                    <button onclick="changeMonth(1)" class="p-2 text-gray-500 hover:bg-gray-100 dark:hover:bg-slate-700 rounded-lg transition">${ICONS.chevronRight}</button>
                </div>
            `;
            container.innerHTML += headerHtml;

            // Logika Pembuatan Grid Kalender
            const firstDay = new Date(STATE.calendarYear, STATE.calendarMonth, 1).getDay();
            const daysInMonth = new Date(STATE.calendarYear, STATE.calendarMonth + 1, 0).getDate();
            
            // Format tanggal hari ini untuk highlight
            const todayObj = new Date();
            const todayStr = `${todayObj.getFullYear()}-${String(todayObj.getMonth() + 1).padStart(2, '0')}-${String(todayObj.getDate()).padStart(2, '0')}`;

            let calendarHtml = `
                <div class="bg-white dark:bg-darkCard rounded-2xl shadow-sm border border-gray-100 dark:border-darkBorder p-4 card-transition">
                    <div class="grid grid-cols-7 gap-1 mb-2">
                        ${['Min', 'Sen', 'Sel', 'Rab', 'Kam', 'Jum', 'Sab'].map(d => `<div class="text-center text-[10px] font-bold text-gray-400 dark:text-gray-500 uppercase">${d}</div>`).join('')}
                    </div>
                    <div class="calendar-grid">
            `;

            // Ruang kosong untuk hari sebelum awal bulan
            for (let i = 0; i < firstDay; i++) {
                calendarHtml += `<div class="calendar-day opacity-0"></div>`;
            }

            // Mengumpulkan data log bulanan untuk Heatmap (Dots)
            const logsThisMonth = STATE.logs.filter(l => {
                const logDate = new Date(l.date);
                return logDate.getMonth() === STATE.calendarMonth && logDate.getFullYear() === STATE.calendarYear;
            });

            // Isi hari dalam bulan
            for (let day = 1; day <= daysInMonth; day++) {
                const dateStr = `${STATE.calendarYear}-${String(STATE.calendarMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = dateStr === todayStr;
                
                // Cari aktivitas di hari ini
                const dayLogs = logsThisMonth.filter(l => l.date === dateStr);
                const uniqueTypeIds = [...new Set(dayLogs.map(l => l.typeId))].slice(0, 3); // Ambil maks 3 warna

                let dotsHtml = `<div class="flex gap-0.5 mt-1 h-1.5">`;
                uniqueTypeIds.forEach(tId => {
                    const type = STATE.getTypeById(tId);
                    if (type) {
                        const colorObj = AVAILABLE_COLORS.find(c => c.id === type.color);
                        const bgClass = colorObj ? colorObj.class : 'bg-gray-400';
                        dotsHtml += `<div class="w-1.5 h-1.5 rounded-full ${bgClass}"></div>`;
                    }
                });
                dotsHtml += `</div>`;

                const dayClasses = isToday 
                    ? 'bg-primary text-white font-bold shadow-md' 
                    : 'bg-gray-50 dark:bg-slate-800 text-gray-700 dark:text-gray-300 hover:bg-gray-100 dark:hover:bg-slate-700 cursor-pointer border border-transparent hover:border-gray-200 dark:hover:border-slate-600 transition';

                calendarHtml += `
                    <div class="calendar-day ${dayClasses}" onclick="goToDate('${dateStr}')">
                        <span class="mt-1">${day}</span>
                        ${dayLogs.length > 0 ? dotsHtml : ''}
                    </div>
                `;
            }

            calendarHtml += `</div></div>`;
            
            // Keterangan interaksi
            calendarHtml += `
                <p class="text-xs text-center text-gray-400 dark:text-gray-500 mt-4 flex items-center justify-center gap-1">
                    <span class="text-primary">${ICONS.clock}</span> Klik tanggal untuk melihat detail aktivitasnya
                </p>
            `;

            container.innerHTML += calendarHtml;
            return container;
        }

                        <div>
                            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-1.5">Nama Kategori</label>
                            <input type="text" id="type-name" class="w-full border-gray-200 dark:border-slate-700 rounded-xl p-3 bg-gray-50 dark:bg-slate-800 text-gray-800 dark:text-white border focus:ring-2 focus:ring-primary focus:border-primary outline-none transition font-medium placeholder-gray-400" placeholder="Misal: Membaca, Coding, Olahraga" required autocomplete="off" />
                        </div>
                        
                        <div>
                            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Pilih Ikon (Emoji)</label>
                            <div class="bg-gray-50 dark:bg-slate-800/50 p-2 rounded-xl border border-gray-100 dark:border-slate-700">
                                <div class="grid grid-cols-6 gap-2 max-h-40 overflow-y-auto p-1 hide-scrollbar" id="emoji-picker">
                                    ${emojisHtml}
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Warna Identitas</label>
                            <div class="flex flex-wrap gap-3" id="color-picker">
                                ${colorsHtml}
                            </div>
                        </div>

                        <div>
                            <label class="block text-xs font-bold text-gray-500 dark:text-gray-400 uppercase tracking-wider mb-2">Sifat Kebiasaan</label>
                            <div class="grid grid-cols-3 gap-2">
                                <label class="cursor-pointer">
                                    <input type="radio" name="type-impact" value="good" class="peer sr-only" checked>
                                    <div class="text-center p-2 rounded-xl border border-gray-200 dark:border-slate-700 peer-checked:bg-green-50 peer-checked:border-green-500 peer-checked:text-green-600 dark:peer-checked:bg-green-900/30 transition text-sm font-bold shadow-sm">😊 Baik</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="type-impact" value="neutral" class="peer sr-only">
                                    <div class="text-center p-2 rounded-xl border border-gray-200 dark:border-slate-700 peer-checked:bg-gray-100 peer-checked:border-gray-500 peer-checked:text-gray-600 dark:peer-checked:bg-slate-700 transition text-sm font-bold shadow-sm">😐 Biasa</div>
                                </label>
                                <label class="cursor-pointer">
                                    <input type="radio" name="type-impact" value="bad" class="peer sr-only">
                                    <div class="text-center p-2 rounded-xl border border-gray-200 dark:border-slate-700 peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-600 dark:peer-checked:bg-red-900/30 transition text-sm font-bold shadow-sm">☹️ Buruk</div>
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-primary text-white font-bold py-3.5 rounded-xl shadow-lg shadow-blue-500/30 hover:bg-primaryHover hover:scale-[1.02] active:scale-[0.98] transition-all mt-6">
                            Simpan Kategori
                        </button>
                    </form>
                </div>
            `);

            // Logika Seleksi Emoji & Warna
            const emojiInput = document.getElementById('type-emoji');
            const colorInput = document.getElementById('type-color');

            // Set default aktif
            setTimeout(() => {
                document.querySelector(`.emoji-option[data-emoji="📚"]`).classList.add('border-primary', 'bg-blue-50', 'dark:bg-blue-900/30');
                document.querySelector(`.color-option[data-color="blue"]`).classList.add('scale-110', 'ring-2', 'ring-offset-2', 'ring-primary', 'dark:ring-offset-darkCard');
            }, 50);

            document.querySelectorAll('.emoji-option').forEach(el => {
                el.addEventListener('click', (e) => {
                    document.querySelectorAll('.emoji-option').forEach(o => o.classList.remove('border-primary', 'bg-blue-50', 'dark:bg-blue-900/30'));
                    el.classList.add('border-primary', 'bg-blue-50', 'dark:bg-blue-900/30');
                    emojiInput.value = el.getAttribute('data-emoji');
                });
            });

            document.querySelectorAll('.color-option').forEach(el => {
                el.addEventListener('click', (e) => {
                    document.querySelectorAll('.color-option').forEach(o => o.classList.remove('scale-110', 'ring-2', 'ring-offset-2', 'ring-primary', 'dark:ring-offset-darkCard'));
                    el.classList.add('scale-110', 'ring-2', 'ring-offset-2', 'ring-primary', 'dark:ring-offset-darkCard');
                    colorInput.value = el.getAttribute('data-color');
                });
            });

            document.getElementById('form-add-type').addEventListener('submit', (e) => {
                e.preventDefault();
                const impactValue = document.querySelector('input[name="type-impact"]:checked').value;
                STATE.addType({
                    name: document.getElementById('type-name').value.trim(),
                    emoji: emojiInput.value,
                    color: colorInput.value,
                    impact: impactValue
                });
                hideModal();
            });
        }

        // --- HANDLER INTERAKSI GLOBAL ---

        function setupGlobalEventListeners() {
            // Navigasi Tab
            document.querySelectorAll('.nav-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    STATE.activeTab = btn.getAttribute('data-tab');
                    renderUI();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                });
            });

            // Ganti Periode Analitik (Tambahan)
            document.addEventListener('click', (e) => {
                if (e.target.closest('.period-btn')) {
                    STATE.analyticsPeriod = e.target.closest('.period-btn').getAttribute('data-period');
                    renderUI();
                }
            });

            // Ganti Hari di Timeline
            document.addEventListener('click', (e) => {
                if (e.target.closest('#prev-day-btn')) {
                    const d = new Date(STATE.currentDate); 
                    d.setDate(d.getDate() - 1);
                    STATE.currentDate = d.toISOString().split('T')[0];
                    renderUI();
                } else if (e.target.closest('#next-day-btn')) {
                    const d = new Date(STATE.currentDate); 
                    d.setDate(d.getDate() + 1);
                    STATE.currentDate = d.toISOString().split('T')[0];
                    renderUI();
                } else if (e.target.closest('#modal-overlay')) {
                    // Tutup modal jika klik di luar
                    hideModal();
                } else if (e.target.closest('#theme-toggle-btn')) {
                    // Toggle Dark Mode
                    isDarkMode = !isDarkMode;
                    if (isDarkMode) {
                        document.documentElement.classList.add('dark');
                        localStorage.setItem('lifelog_theme', 'dark');
                    } else {
                        document.documentElement.classList.remove('dark');
                        localStorage.setItem('lifelog_theme', 'light');
                    }
                    updateThemeIcon();
                    // Render ulang perlahan agar transisi warna grafik mulus
                    setTimeout(renderUI, 50);
                }
            });
        }

        // Fungsi Helper untuk dipanggil dari HTML yang dirender
        window.changeMonth = function(dir) {
            let newMonth = STATE.calendarMonth + dir;
            let newYear = STATE.calendarYear;
            if (newMonth > 11) { newMonth = 0; newYear++; }
            if (newMonth < 0) { newMonth = 11; newYear--; }
            STATE.calendarMonth = newMonth;
            STATE.calendarYear = newYear;
            renderUI();
        };

        window.goToDate = function(dateStr) {
            STATE.currentDate = dateStr;
            STATE.activeTab = 'timeline';
            renderUI();
        };

        // --- SISTEM NOTIFIKASI (TOAST) ---
        function showToast(message, type = 'success') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            const bgColor = type === 'success' ? 'bg-gray-800 dark:bg-white' : 'bg-red-500';
            const textColor = type === 'success' ? 'text-white dark:text-gray-900' : 'text-white';
            
            toast.className = `${bgColor} ${textColor} px-4 py-2.5 rounded-xl shadow-xl font-medium text-sm flex items-center gap-2 transform transition-all duration-300 translate-y-[-20px] opacity-0`;
            toast.innerHTML = `
                ${type === 'success' ? '✓' : '⚠'} ${message}
            `;
            
            container.appendChild(toast);
            
            // Animasi masuk
            requestAnimationFrame(() => {
                toast.classList.remove('translate-y-[-20px]', 'opacity-0');
            });

            // Hilang setelah 3 detik
            setTimeout(() => {
                toast.classList.add('translate-y-[-20px]', 'opacity-0');
                setTimeout(() => toast.remove(), 300); // Tunggu animasi selesai
            }, 3000);
        }

        // --- FITUR EKSPOR/IMPOR DATA ---
        window.exportData = function() {
            const dataStr = JSON.stringify({
                types: STATE.activityTypes,
                logs: STATE.logs,
                exportDate: new Date().toISOString()
            }, null, 2);
            
            const dataUri = 'data:application/json;charset=utf-8,'+ encodeURIComponent(dataStr);
            const exportFileDefaultName = `LifeLog_Backup_${STATE.currentDate}.json`;

            const linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            linkElement.click();
            showToast('Data berhasil diekspor', 'success');
        };

        window.importData = function(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.types && data.logs) {
                        STATE.activityTypes = data.types;
                        STATE.logs = data.logs;
                        STATE.saveData();
                        renderUI();
                        showToast('Data berhasil dipulihkan', 'success');
                    } else {
                        showToast('Format file JSON tidak valid', 'error');
                    }
                } catch (err) {
                    showToast('Gagal membaca file', 'error');
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // Reset input
        };

        window.clearAllData = function() {
            if (confirm('PERINGATAN! Semua data aktivitas dan kategori akan dihapus permanen. Lanjutkan?')) {
                if(confirm('Apakah kamu benar-benar yakin?')) {
                    STATE.activityTypes = [];
                    STATE.logs = [];
                    STATE.saveData();
                    renderUI();
                    showToast('Semua data berhasil dihapus', 'success');
                }
            }
        };

        // ----------------------------------------------------------------------
        // JALANKAN APLIKASI
        // ----------------------------------------------------------------------
        document.addEventListener('DOMContentLoaded', initUI);

    </script>
</body>
</html>
