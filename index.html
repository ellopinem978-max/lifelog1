            <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

        // 1. PASTE FIREBASE CONFIG LU DI SINI
        const firebaseConfig = {
        apiKey: "AIzaSyCf4OwcSbwD5g5pDHvGev8E7Ye5zr14jrM",
        authDomain: "lifetrack-a1dd9.firebaseapp.com",
        projectId: "lifetrack-a1dd9",
        storageBucket: "lifetrack-a1dd9.firebasestorage.app",
        messagingSenderId: "151838180601",
        appId: "1:151838180601:web:10e375650fe0e9d1a88e28"
        };

        // 2. Inisialisasi Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // 3. Bikin Wrapper Global Biar Bisa Dipanggil dari Script Utama lu
    // 3. Bikin Wrapper Global Biar Bisa Dipanggil dari Script Utama lu
    // 3. Bikin Wrapper Global Biar Bisa Dipanggil dari Script Utama lu
        window.CloudEngine = {
            currentUser: null,
            login: async () => {
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (window.UIEngine) window.UIEngine.showToast(`Berhasil login sebagai ${result.user.displayName}!`, 'success', '👋');
                    return result.user;
                } catch (error) {
                    console.error("Login Error:", error);
                    if (window.UIEngine) window.UIEngine.showToast("Gagal login: " + error.message, 'error');
                }
            },
            logout: async () => {
                await signOut(auth);
                if (window.UIEngine) window.UIEngine.showToast("Berhasil logout.", 'success', '🔒');
            },
            
            // 👉 FITUR BARU: Push Data ke Cloud
            syncToCloud: async () => {
                if (!window.CloudEngine.currentUser) {
                    window.UIEngine.showToast("Lu harus login Google dulu bro buat backup ke Cloud!", "warning", "⚠️");
                    return;
                }
                try {
                    window.UIEngine.showToast("Sedang mengupload data ke Cloud...", "info", "☁️");
                    const uid = window.CloudEngine.currentUser.uid;
                    
                    // Ambil semua data lokal
                    const expenses = await window.DBEngine.getAll('expenses');
                    const activities = await window.DBEngine.getAll('activities');
                    const categories = await window.DBEngine.getAll('categories');
                    const settingsArray = await window.DBEngine.getAll('settings');
                    
                    // Ubah array settings jadi object biar gampang disimpen
                    const settingsObj = {};
                    settingsArray.forEach(s => settingsObj[s.key] = s.value);

                    // Kirim ke Firestore
                    await setDoc(doc(db, "users", uid), {
                        expenses: expenses,
                        activities: activities,
                        categories: categories,
                        settings: settingsObj,
                        lastSync: new Date().toISOString()
                    });
                    
                    window.UIEngine.showToast("Data berhasil di-backup ke Cloud!", "success", "✅");
                } catch (error) {
                    console.error("Sync Up Error:", error);
                    window.UIEngine.showToast("Gagal upload data: " + error.message, "error");
                }
            },

            // 👉 FITUR BARU: Tarik Data dari Cloud
            syncFromCloud: async () => {
                if (!window.CloudEngine.currentUser) {
                    window.UIEngine.showToast("Login Google dulu bro!", "warning", "⚠️");
                    return;
                }
                
                // Konfirmasi biar user nggak kaget datanya ketimpa
                window.UIEngine.showModal("Tarik Data Cloud", 
                    "<p class='text-amber-600 font-bold'>Peringatan: Menarik data dari Cloud akan menimpa semua data lokal di device ini. Lanjutkan?</p>", 
                    async () => {
                        try {
                            window.UIEngine.showToast("Sedang mengunduh data dari Cloud...", "info", "☁️");
                            const uid = window.CloudEngine.currentUser.uid;
                            const docSnap = await getDoc(doc(db, "users", uid));

                            if (docSnap.exists()) {
                                const data = docSnap.data();
                                
                                // Bersihkan DB Lokal
                                await window.DBEngine.clear('expenses');
                                await window.DBEngine.clear('activities');
                                await window.DBEngine.clear('categories');
                                await window.DBEngine.clear('settings');

                                // Masukkan data Cloud ke DB Lokal
                                if (data.expenses?.length) await window.DBEngine.bulkPut('expenses', data.expenses);
                                if (data.activities?.length) await window.DBEngine.bulkPut('activities', data.activities);
                                if (data.categories?.length) await window.DBEngine.bulkPut('categories', data.categories);
                                
                                if (data.settings) {
                                    for (const [k, v] of Object.entries(data.settings)) {
                                        await window.DBEngine.put('settings', { key: k, value: v });
                                    }
                                }

                                window.UIEngine.showToast("Restore dari Cloud sukses! Memuat ulang...", "success", "🔄");
                                setTimeout(() => window.location.reload(), 1500);
                            } else {
                                window.UIEngine.showToast("Belum ada backup data di Cloud untuk akun ini.", "warning", "📂");
                            }
                        } catch (error) {
                            console.error("Sync Down Error:", error);
                            window.UIEngine.showToast("Gagal download data: " + error.message, "error");
                        }
                    }, "Ya, Tarik Data"
                );
            }
        };

        // 4. Listener kalau status login berubah (Nge-detect pindah device)
        onAuthStateChanged(auth, (user) => {
            const btnText = document.getElementById('auth-btn-text');
            const btnIcon = document.getElementById('auth-btn-icon');
            
            if (user) {
                window.CloudEngine.currentUser = user;
                console.log("User Logged In:", user.email);
                
                // Ubah UI Sidebar
                document.getElementById('sidebar-username').innerText = user.displayName;
                document.getElementById('sidebar-avatar').innerText = "🔥"; 
                
                // Ubah Tombol di Setting
                if(btnText) btnText.innerText = "Logout dari Google";
                if(btnIcon) btnIcon.setAttribute('data-lucide', 'log-out');
                
            } else {
                window.CloudEngine.currentUser = null;
                
                // Reset UI
                document.getElementById('sidebar-username').innerText = "Guest (Offline)";
                document.getElementById('sidebar-avatar').innerText = "🦸";
                
                if(btnText) btnText.innerText = "Login with Google";
                if(btnIcon) btnIcon.setAttribute('data-lucide', 'log-in');
            }
        
            // Re-render icon lucide kalau ada perubahan DOM
            if (window.lucide) window.lucide.createIcons();
            if (window.App && AppState.activeTab === 'settings') window.App.render();
        });
    </script>

                const Utils = {
                    formatCurrency: (amount) => {
                        return new Intl.NumberFormat('id-ID', { 
                            style: 'currency', 
                            currency: 'IDR', 
                            maximumFractionDigits: 0 
                        }).format(amount);
                    },
                    
                    formatDuration: (minutes) => {
                        if (!minutes || minutes <= 0) return '0 mnt';
                        const h = Math.floor(minutes / 60); 
                        const m = Math.floor(minutes % 60);
                        if (h > 0 && m > 0) return `${h}j ${m}m`;
                        if (h > 0) return `${h} jam`; 
                        return `${m} mnt`;
                    },
                    
                    getToday: () => {
                        const d = new Date(); 
                        d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); 
                        return d.toISOString().split('T')[0];
                    },
                    
                    getWeekRange: (date = new Date()) => {
                        const d = new Date(date); 
                        const day = d.getDay() || 7; 
                        d.setDate(d.getDate() - day + 1); 
                        const start = new Date(d);
                        d.setDate(d.getDate() + 6); 
                        const end = new Date(d);
                        return { 
                            start: start.toISOString().split('T')[0], 
                            end: end.toISOString().split('T')[0] 
                        };
                    },
                    
                    getMonthString: (date = new Date()) => {
                        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}`;
                    },
                    
                    getYearString: (date = new Date()) => {
                        return `${date.getFullYear()}`;
                    },
                    
                    getDatesInRange: (startStr, endStr) => {
                        let dates = []; 
                        let curr = new Date(startStr); 
                        const end = new Date(endStr);
                        while(curr <= end) { 
                            dates.push(curr.toISOString().split('T')[0]); 
                            curr.setDate(curr.getDate() + 1); 
                        }
                        return dates;
                    },
                    
                    generateId: (prefix = 'id') => {
                        return `${prefix}_${Date.now()}_${Math.random().toString(36).substr(2, 5)}`;
                    },
                    escapeHTML: (str) => {
                    if (!str) return '';
                    return str.replace(/[&<>'"]/g, 
                        tag => ({
                            '&': '&amp;',
                            '<': '&lt;',
                            '>': '&gt;',
                            "'": '&#39;',
                            '"': '&quot;'
                        }[tag] || tag)
                    );

                        return '#94a3b8'; // default slate
                    },

                    // Debounce function for search inputs
                    debounce: (func, delay) => {
                        let timeoutId;
                        return function (...args) {
                            clearTimeout(timeoutId);
                            timeoutId = setTimeout(() => {

                            }, delay);
                        };
                    }

                /**
                 * ==========================================
                 * MODULE 4: DATABASE ENGINE (IndexedDB)
                 * ==========================================
                 */
                const DBEngine = {
                    db: null,

                    init: () => {
                        return new Promise((resolve, reject) => {
                            const request = indexedDB.open(CONFIG.DB_NAME, CONFIG.DB_VERSION);
                            
                            request.onerror = (e) => {
                                console.error("IndexedDB Error:", e);
                                reject("Gagal membuka database lokal. Pastikan browser Anda mendukung IndexedDB.");
                            };
                            
                            request.onsuccess = (e) => {
                                DBEngine.db = e.target.result;
                                resolve(DBEngine.db);
                            };
                            
                            request.onupgradeneeded = (e) => {
                                const db = e.target.result;
                                
                                // Create object stores if not exist
                                if (!db.objectStoreNames.contains('expenses')) {
                                    const expStore = db.createObjectStore('expenses', { keyPath: 'id' });
                                    expStore.createIndex('date', 'date', { unique: false });
                                    expStore.createIndex('categoryId', 'categoryId', { unique: false });
                                }
                                
                                if (!db.objectStoreNames.contains('activities')) {
                                    const actStore = db.createObjectStore('activities', { keyPath: 'id' });
                                    actStore.createIndex('date', 'date', { unique: false });
                                    actStore.createIndex('categoryId', 'categoryId', { unique: false });
                                }
                                
                                if (!db.objectStoreNames.contains('categories')) {
                                    const catStore = db.createObjectStore('categories', { keyPath: 'id' });
                                    catStore.createIndex('type', 'type', { unique: false });
                                }
                                
                                if (!db.objectStoreNames.contains('settings')) {
                                    db.createObjectStore('settings', { keyPath: 'key' });
                                }
                            };
                        });
                    },

                    getAll: (storeName) => {
                        return new Promise((resolve, reject) => {
                            if (!DBEngine.db) return reject("DB not initialized");
                            const transaction = DBEngine.db.transaction(storeName, 'readonly');
                            const request = transaction.objectStore(storeName).getAll();
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => reject(request.error);
                        });
                    },

                    put: (storeName, item) => {
                        return new Promise((resolve, reject) => {
                            const transaction = DBEngine.db.transaction(storeName, 'readwrite');
                            const request = transaction.objectStore(storeName).put(item);
                            request.onsuccess = () => resolve(request.result);
                            request.onerror = () => reject(request.error);
                        });
                    },

                    delete: (storeName, id) => {
                        return new Promise((resolve, reject) => {
                            const transaction = DBEngine.db.transaction(storeName, 'readwrite');
                            const request = transaction.objectStore(storeName).delete(id);
                            request.onsuccess = () => resolve(true);
                            request.onerror = () => reject(request.error);
                        });
                    },

                    clear: (storeName) => {
                        return new Promise((resolve, reject) => {
                            const transaction = DBEngine.db.transaction(storeName, 'readwrite');
                            const request = transaction.objectStore(storeName).clear();
                            request.onsuccess = () => resolve(true);
                            request.onerror = () => reject(request.error);
                        });
                    },

                    bulkPut: (storeName, items) => {
                        return new Promise((resolve, reject) => {
                            const transaction = DBEngine.db.transaction(storeName, 'readwrite');
                            const store = transaction.objectStore(storeName);
                            items.forEach(item => store.put(item));
                            transaction.oncomplete = () => resolve(true);
                            transaction.onerror = () => reject(transaction.error);
                        });
                    }
                };

                const GameEngine = {
                // --- MASUKKAN DI DALAM GameEngine ---
                processActivityImpact: (activity) => {
                    const cat = Utils.getCategoryObj(activity.categoryId, 'time');
                    const meta = cat.meta || 'errands'; 
                    const base = BASE_EFFECTS[meta] || BASE_EFFECTS['errands'];
                    
                    // 1. Durasi Multiplier
                    const durHours = activity.duration / 60;
                    let durMult = 1.0;
                    if (durHours < 0.5) durMult = 0.5;
                    else if (durHours > 2 && durHours <= 4) durMult = 1.5;
                    else if (durHours > 4) durMult = 2.0;

                    // 2. Deteksi Konteks Waktu
                    const hour = parseInt(activity.startTime.split(':')[0]);
                    const isPagiProduktif = hour >= 6 && hour < 11;
                    const isSiang = hour >= 11 && hour < 17;
                    const isMalam = hour >= 17 && hour < 22;
                    const isLarutMalam = hour >= 22 || hour < 5;

                    // 3. Terapkan Time Multiplier ke Stat Spesifik
                    let finalDeltas = { ...base };

                    if (meta === 'ent_passive' && isPagiProduktif) {
                        finalDeltas.focus *= 1.5;
                        finalDeltas.discipline *= 1.5;
                    }
                    if ((meta === 'ent_passive' || meta === 'ent_interactive') && isLarutMalam) {
                        finalDeltas.health = (finalDeltas.health === 0 ? -1 : finalDeltas.health) * 1.5; 
                        finalDeltas.discipline *= 1.2;
                    }
                    if (meta === 'work_study' && (isPagiProduktif || isSiang)) {
                        finalDeltas.focus *= 1.2;
                        finalDeltas.growth *= 1.2;
                    }

                    // 4. Kalkulasi Final (Base * DurMult * TimeMult)
                    for (let stat in finalDeltas) {
                        finalDeltas[stat] = finalDeltas[stat] * durMult;
                    }

                    return finalDeltas;
                },

        applyDeltasToStats: async (deltas) => {
            let stats = AppState.settings.characterStats;
            let leveledUp = [];
            let leveledDown = [];

            for (let stat in deltas) {
                let change = Math.round(deltas[stat]);
                if (change === 0) continue;

                let currentLevel = stats[stat].level || 1;
                let currentExp = (stats[stat].exp || 0) + change;

                while (currentExp >= BASE_EXP_PER_LEVEL) {
                    currentLevel++;
                    currentExp -= BASE_EXP_PER_LEVEL;
                    leveledUp.push(STATS_CONFIG[stat].name);
                }
                while (currentExp < 0 && currentLevel > 1) {
                    currentLevel--;
                    currentExp += BASE_EXP_PER_LEVEL;
                    leveledDown.push(STATS_CONFIG[stat].name);
                }
                if (currentLevel === 1 && currentExp < 0) currentExp = 0;

                stats[stat].level = currentLevel;
                stats[stat].exp = currentExp;
            }

            await App.updateSetting('characterStats', stats);

            if (leveledUp.length > 0) UIEngine.showToast(`Stat Level Up: ${leveledUp.join(', ')} 🔼`, 'info', '✨');
            if (leveledDown.length > 0) UIEngine.showToast(`Stat Menurun: ${leveledDown.join(', ')} 🔽`, 'error', '⚠️');
        },
                    getStats: () => {
            // --- LOGIKA BARU: Level Dihitung dari Akumulasi Kekuatan 6 Stat Karakter ---
            let totalStatXP = 0;
            const statsObj = AppState.settings.characterStats || {};
            
            Object.keys(STATS_CONFIG).forEach(key => {
                const stat = statsObj[key] || { level: 1, exp: 0 };
                // Setiap level di stat bernilai 100 XP + sisa exp yang ada
                totalStatXP += ((stat.level - 1) * BASE_EXP_PER_LEVEL) + stat.exp;
            });

            // XP Bonus dari fitur lain (Biar mencatat uang tetap dihargai)
            const moneyBonusXP = AppState.expenses.length * 2; 
            const streakXP = AppState.settings.totalStreakXP || 0;
            
            // TOTAL XP SEKARANG
            const totalXP = totalStatXP + moneyBonusXP + streakXP;
            
            // Exponential Leveling Formula (Tetap sama)
            const level = Math.floor(Math.sqrt(totalXP / 10)) + 1; 
            
            const currentBaseXP = 10 * Math.pow(level - 1, 2);
            const nextBaseXP = 10 * Math.pow(level, 2);
            
            const progress = totalXP - currentBaseXP;
            const needed = nextBaseXP - currentBaseXP;
            const pct = Math.min((progress / needed) * 100, 100);

            // ... Lanjutan kode title/gelar (Warga Biasa, dll) biarkan sama persis ...
            // ... (Sampai akhir return)
                        
                        const titles = [
                            "Warga Biasa", "Pemula Penghemat", "Tracker Pemula", 
                            "Penganalisa", "Manajer Hidup", "Pengatur Cerdas", 
                            "Master Efisiensi", "Grandmaster", "Legendary Tracker", "Dewa Waktu & Uang"
                        ];
                        // Clamp title index
                        const titleIndex = Math.min(Math.floor((level - 1) / 3), titles.length - 1);
                        const title = titles[titleIndex];

                        // --- KODE TAMBAHAN UNTUK SELEBRASI LEVEL UP ---
                    if (AppState.settings.currentLevel && level > AppState.settings.currentLevel) {
                        // Update level di state & simpan ke DB
                        AppState.settings.currentLevel = level;
                        DBEngine.put('settings', { key: 'currentLevel', value: level });
                        
                        // Munculkan popup selebrasi
                        setTimeout(() => {
                            UIEngine.showModal('🎉 LEVEL UP!', `
                                <div class="text-center">
                                    <div class="text-7xl mb-4 animate-bounceSlow">🌟</div>
                                    <h2 class="text-2xl font-black text-slate-800">Kerja Bagus!</h2>

                                    <p class="text-brand-600 font-bold mt-1 text-lg">Gelar Baru: ${title}</p>

                            `, null, 'Lanjutkan');

                        }, 800);
                    } else if (!AppState.settings.currentLevel) {
                        // Set level awal jika baru pertama kali jalan
                        AppState.settings.currentLevel = level;
                        DBEngine.put('settings', { key: 'currentLevel', value: level });
                    }
                    // --- AKHIR KODE TAMBAHAN ---
                        return { 
                            level, 
                            totalXP, 
                            title, 
                            progress, 
                            needed, 
                            pct, 
                            expCount: AppState.expenses.length,
                            actCount: AppState.activities.length
                        };
                    },

                    evaluateBadges: async () => {
                        const stats = GameEngine.getStats();
                        const earned = [];
                        
                        // Category counting
                        const catCounts = { money: {}, time: {} };
                        AppState.expenses.forEach(e => catCounts.money[e.categoryId] = (catCounts.money[e.categoryId] || 0) + 1);
                        AppState.activities.forEach(a => catCounts.time[a.categoryId] = (catCounts.time[a.categoryId] || 0) + 1);
                        
                        // Time counting
                        let totalProdTime = 0;
                        let totalRestTime = 0;
                        AppState.activities.forEach(a => {
                            const cat = Utils.getCategoryObj(a.categoryId, 'time');
                            if(cat.meta === 'produktif') totalProdTime += a.duration;

                    // Simple Confetti implementation via Canvas
                    triggerConfetti: () => {
                        const canvas = document.getElementById('confetti-canvas');
                        const ctx = canvas.getContext('2d');
                        canvas.width = window.innerWidth;
                        canvas.height = window.innerHeight;
                        
                        const particles = [];
                        const colors = ['#f97316', '#3b82f6', '#10b981', '#f59e0b', '#a855f7', '#ec4899'];
                        
                        for(let i=0; i<100; i++) {
                            particles.push({
                                x: canvas.width / 2,
                                y: canvas.height / 2 + 100,
                                r: Math.random() * 6 + 2,
                                dx: Math.random() * 10 - 5,
                                dy: Math.random() * -10 - 5,
                                color: colors[Math.floor(Math.random() * colors.length)],
                                tilt: Math.floor(Math.random() * 10) - 10,
                                tiltAngleInc: (Math.random() * 0.07) + 0.05,
                                tiltAngle: 0
                            });
                        }
                        
                        let animationId;
                        let frame = 0;
                        
                        function draw() {
                            frame++;
                            ctx.clearRect(0, 0, canvas.width, canvas.height);
                            
                            let activeCount = 0;
                            particles.forEach(p => {
                                p.tiltAngle += p.tiltAngleInc;
                                p.y += (Math.cos(p.tiltAngle) + 1 + p.r / 2) / 2;
                                p.x += Math.sin(p.tiltAngle) * 2;
                                p.dy += 0.1; // gravity
                                p.x += p.dx;
                                p.y += p.dy;
                                
                                if(p.y <= canvas.height) activeCount++;
                                
                                ctx.beginPath();
                                ctx.lineWidth = p.r;
                                ctx.strokeStyle = p.color;
                                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                                ctx.stroke();
                            });
                            
                            if(activeCount > 0 && frame < 300) {
                                animationId = requestAnimationFrame(draw);
                            } else {
                                ctx.clearRect(0, 0, canvas.width, canvas.height);
                            }
                        }
                        
                        draw();
                    }
                };

                                        await DBEngine.clear('categories');
                                        await DBEngine.clear('settings');

                                        // Insert New Data
                                        if (result.data.expenses?.length) await DBEngine.bulkPut('expenses', result.data.expenses);
                                        if (result.data.activities?.length) await DBEngine.bulkPut('activities', result.data.activities);
                                        if (result.data.categories?.length) await DBEngine.bulkPut('categories', result.data.categories);
                                        
                                        if (result.data.settings) {
                                            for (const [k, v] of Object.entries(result.data.settings)) {
                                                await DBEngine.put('settings', { key: k, value: v });

                // --- AUTO PRUNING (Hapus Data Lebih Dari 1 Tahun) ---
                pruneOldData: async () => {
                    const oneYearAgo = new Date();
                    oneYearAgo.setFullYear(oneYearAgo.getFullYear() - 1);
                    const cutoffDate = oneYearAgo.toISOString().split('T')[0];

                    let deletedCount = 0;
                    
                    // Cek dan Hapus Expenses Lama
                    for (let i = AppState.expenses.length - 1; i >= 0; i--) {
                        if (AppState.expenses[i].date < cutoffDate) {
                            await DBEngine.delete('expenses', AppState.expenses[i].id);
                            AppState.expenses.splice(i, 1);
                            deletedCount++;
                        }
                    }
                    
                    // Cek dan Hapus Activities Lama
                    for (let i = AppState.activities.length - 1; i >= 0; i--) {
                        if (AppState.activities[i].date < cutoffDate) {
                            await DBEngine.delete('activities', AppState.activities[i].id);
                            AppState.activities.splice(i, 1);
                            deletedCount++;
                        }
                    }
                    
                    if(deletedCount > 0) console.log(`Maintenance: Menghapus ${deletedCount} data yang lebih lama dari 1 tahun.`);
                }

                };
                
                /**
             * ==========================================
             * MODULE 10: SINGLE-FILE PWA HACK
             * ==========================================
             */
            const setupSingleFilePWA = () => {
        // 1. Manifest JSON dinamis (Ini masih aman di beberapa browser)
        const manifestJSON = {
            "name": "LifeTracker Pro",
            "short_name": "TrackerPro",
            "description": "Aplikasi pelacak waktu dan keuangan gamifikasi.",
            "start_url": window.location.href.split('?')[0],
            "display": "standalone",
            "background_color": "#0f172a",
            "theme_color": "#3b82f6",
            "icons": [{
                "src": "https://cdn-icons-png.flaticon.com/512/1157/1157044.png",
                "sizes": "512x512",
                "type": "image/png",
                "purpose": "any maskable"
            }]
        };
        
        const manifestBlob = new Blob([JSON.stringify(manifestJSON)], { type: 'application/json' });
        document.getElementById('dynamic-manifest').href = URL.createObjectURL(manifestBlob);

        // 2. Registrasi Service Worker yang aman
        if ('serviceWorker' in navigator) {
            // Alih-alih pakai Blob, kita arahkan ke file sw.js eksternal. 
            // Kalau file nggak ada, dia cuma gagal diam-diam tanpa ngerusak UI.
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log('Service Worker Ready! Offline mode active.'))
                .catch(() => console.log('Info: Mode offline PWA dimatikan (Butuh file sw.js eksternal).'));
        }
    };

            // Jalankan pembuat PWA virtual
            setupSingleFilePWA();
